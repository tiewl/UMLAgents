name: UMLAgents CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Lint with flake8
      run: |
        flake8 umlagents --count --max-complexity=10 --statistics
    
    - name: Type check with mypy
      run: |
        mypy umlagents --ignore-missing-imports
    
    - name: Run validation tests
      run: |
        python -m pytest test_validation.py -v
    
    - name: Run CLI validation tests
      run: |
        python -m pytest test_cli_validation.py -v
    
    - name: Validate YAML examples
      run: |
        for yaml in examples/*.yaml; do
          echo "Validating $yaml"
          python -m umlagents.cli validate "$yaml"
        done

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          umlagents/umlagents:latest
          umlagents/umlagents:${{ github.sha }}
        platforms: linux/amd64,linux/arm64